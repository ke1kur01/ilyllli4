<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ililli4</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
background: radial-gradient(circle at center, #0a0a0a, #000);
color: white;
overflow-x: hidden;
}

/* 🌌 фон шум */
body::after {
content:"";
position:fixed;
width:100%;
height:100%;
background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
opacity:0.2;
z-index:-1;
}

/* 🧱 рамка */
.wrapper {
margin:20px;
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
box-shadow:0 0 60px rgba(255,255,255,0.05);
overflow:hidden;
}

/* секции */
.section {
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:60px 20px;
text-align:center;
}

/* аватар */
.avatar {
width:160px;
border-radius:50%;
box-shadow:0 0 40px rgba(255,255,255,0.3);
margin-bottom:20px;
}

h1 {font-size:42px;}
.subtitle {opacity:0.6;margin-top:10px;}

.buttons a {
display:inline-block;
margin:10px;
padding:14px 26px;
border-radius:12px;
text-decoration:none;
color:white;
transition:0.3s;
}

.twitch {background:#9146ff;}
.telegram {background:#229ED9;}

.buttons a:hover {
transform:translateY(-4px);
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* 📜 текст */
.about {
max-width:700px;
line-height:1.6;
opacity:0.8;
}

/* 💬 чат */
.chat {
width:90%;
max-width:700px;
height:300px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
padding:10px;
background:rgba(0,0,0,0.5);
}

.msg {
font-size:14px;
margin:4px 0;
opacity:0.9;
}

.name {color:#9146ff;}
</style>
</head>

<body>

<div class="wrapper">

<!-- HERO -->
<div class="section">
<img src="avatar.jpg" class="avatar">
<h1>ililli4</h1>
<div class="subtitle">cs • стримы • тунчазы</div>

<div class="buttons">
<a class="twitch" href="https://www.twitch.tv/ilyllli4" target="_blank">Twitch</a>
<a class="telegram" href="https://t.me/+XdE7oQCOdGQxOTQy" target="_blank">Telegram</a>
</div>
</div>

<!-- ABOUT -->
<div class="section">
<h1>что происходит</h1>

<div class="about">
стримы в основном про cs, но не только.<br><br>
иногда это попытки играть нормально,<br>
иногда полный разнос и тунчазы.<br><br>
тут нет идеального геймплея,<br>
зато есть атмосфера и движ.
</div>
</div>

<!-- 💬 CHAT -->
<div class="section">
<h1>чат</h1>

<div class="chat" id="chat"></div>
</div>

</div>

<script>

/* 💬 МНОГО СООБЩЕНИЙ */
const chat = document.getElementById("chat");

const names = ["user123","csgo_fan","tunchaz","viewer","pro","random","ghost"];
const messages = [
"ДА КАК ТАК",
"это было жёстко",
"тунчазы пошли",
"лучший стример",
"давай ещё катку",
"ты видел это??",
"он жив?",
"GG",
"не повезло",
"это клип",
"жесть"
];

function addMessage() {
const div = document.createElement("div");
div.className = "msg";

const name = names[Math.floor(Math.random()*names.length)];
const msg = messages[Math.floor(Math.random()*messages.length)];

div.innerHTML = `<span class="name">${name}:</span> ${msg}`;
chat.appendChild(div);

if(chat.children.length > 100){
chat.removeChild(chat.firstChild);
}

chat.scrollTop = chat.scrollHeight;
}

/* сразу много сообщений */
for(let i=0;i<40;i++) addMessage();

/* потом поток */
setInterval(addMessage, 300);

</script>

</body>
</html>
