<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ililli4</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
background:#0e0e10;
color:white;
display:flex;
}

/* 🔥 MAIN */
.main {
flex:1;
padding:40px;
}

/* 🧍 HERO */
.avatar {
width:120px;
border-radius:50%;
margin-bottom:20px;
}

h1 {font-size:36px;}
.sub {opacity:0.6;margin-bottom:20px;}

.buttons a {
margin-right:10px;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:white;
}

.twitch {background:#9146ff;}
.telegram {background:#229ED9;}

.info {
margin-top:30px;
opacity:0.8;
line-height:1.6;
}

/* 💬 CHAT */
.chat {
width:320px;
height:100vh;
background:#18181b;
padding:10px;
overflow:hidden;
border-left:1px solid #333;
}

.chat-header {
padding:10px;
font-weight:bold;
border-bottom:1px solid #333;
}

.messages {
height:90%;
overflow:hidden;
}

.msg {
font-size:13px;
margin:3px 0;
}

.name {font-weight:bold;}
.vip {color:#ff69b4;}
.mod {color:#00ff88;}
.sub {color:#ffd700;}
</style>
</head>

<body>

<!-- 🧍 MAIN -->
<div class="main">

<img src="avatar.jpg" class="avatar">

<h1>ililli4</h1>
<div class="sub">cs • тунчазы • всё подряд</div>

<div class="buttons">
<a class="twitch" href="https://www.twitch.tv/ilyllli4" target="_blank">Twitch</a>
<a class="telegram" href="https://t.me/+XdE7oQCOdGQxOTQy" target="_blank">Telegram</a>
</div>

<div class="info">
🔴 сейчас онлайн: <span id="online">23</span><br><br>

стримы почти всегда<br>
играю во всё: cs, тунчазы, что угодно<br>
иногда фильмы, иногда разнос<br><br>

если зашёл — уже часть стрима
</div>

</div>

<!-- 💬 CHAT -->
<div class="chat">

<div class="chat-header">чат</div>

<div class="messages" id="chat"></div>

</div>

<script>

/* 💬 РЕАЛЬНЫЙ ЧАТ */
const chat = document.getElementById("chat");

const users = [
{name:"proPlayer",role:"mod"},
{name:"vip_guy",role:"vip"},
{name:"sub777",role:"sub"},
{name:"viewer123"},
{name:"cs_master"},
{name:"tank_lord"},
{name:"random"}
];

const msgs = [
"ДА КАК",
"тунчазы пошли",
"это было жёстко",
"GG",
"он жив?",
"норм сыграл",
"это клип",
"давай ещё",
"жесть",
"что происходит"
];

function addMsg() {
const u = users[Math.floor(Math.random()*users.length)];
const m = msgs[Math.floor(Math.random()*msgs.length)];

const div = document.createElement("div");
div.className="msg";

let roleClass = u.role ? u.role : "";

div.innerHTML = `<span class="name ${roleClass}">${u.name}:</span> ${m}`;

chat.appendChild(div);

if(chat.children.length > 120){
chat.removeChild(chat.firstChild);
}

chat.scrollTop = chat.scrollHeight;
}

/* много сразу */
for(let i=0;i<60;i++) addMsg();

/* поток */
setInterval(addMsg, 200);

/* 📈 онлайн растёт */
let online = 23;
setInterval(()=>{
online += Math.floor(Math.random()*3);
document.getElementById("online").innerText = online;
},3000);

</script>

</body>
</html>
