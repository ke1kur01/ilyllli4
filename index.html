<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ilyllli4</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0a0a0a;
color: white;
text-align: center;
}

/* фон */
body::before {
content: "";
position: fixed;
inset: 0;
background: radial-gradient(circle, rgba(255,255,255,0.05), transparent);
}

/* контейнер */
.container {
padding: 60px 20px;
}

/* фото */
.avatar {
width: 260px;
border-radius: 20px;
box-shadow: 0 20px 80px rgba(0,0,0,0.6);
margin-bottom: 30px;
}

/* заголовок */
h1 {
font-size: 48px;
margin: 10px 0;
}

/* описание */
.desc {
color: #aaa;
margin-bottom: 40px;
}

/* кнопки */
.buttons {
display: flex;
justify-content: center;
gap: 20px;
flex-wrap: wrap;
}

.btn {
padding: 16px 28px;
border-radius: 999px;
text-decoration: none;
color: white;
font-weight: bold;
transition: 0.3s;
}

/* твич */
.twitch {
background: #9146ff;
}

.twitch:hover {
transform: translateY(-3px);
box-shadow: 0 10px 40px rgba(145,70,255,0.4);
}

/* тг */
.telegram {
background: #229ED9;
}

.telegram:hover {
transform: translateY(-3px);
box-shadow: 0 10px 40px rgba(34,158,217,0.4);
}

</style>
</head>

<body>

<div class="container">

<img src="photo.jpg" class="avatar">

<h1>ilyllli4</h1>

<p class="desc">стримы, рофлы, жизнь</p>

<div class="buttons">
<a class="btn twitch" href="https://www.twitch.tv/ilyllli4" target="_blank">
Twitch
</a>

<a class="btn telegram" href="https://t.me/+XdE7oQCOdGQxOTQy" target="_blank">
Telegram
</a>
</div>

</div>

</body>
</html>
