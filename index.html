<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>РОФЛ СТРИМЕР 9000</title>

<style>
body {
background: black;
color: lime;
font-family: monospace;
text-align: center;
}

button {
margin: 10px;
padding: 10px;
font-size: 16px;
background: purple;
color: white;
border: none;
cursor: pointer;
}

#chat {
height: 200px;
overflow-y: auto;
border: 1px solid purple;
padding: 10px;
}

.glitch {
animation: glitch 0.1s infinite;
}

@keyframes glitch {
0% { transform: translate(2px,2px); }
50% { transform: translate(-2px,-2px); }
100% { transform: translate(2px,-2px); }
}
</style>
</head>

<body>

<h1>💀 РОФЛ СТРИМЕР 💀</h1>

<p>👀 Онлайн: <span id="online">1</span></p>

<button onclick="donate()">💸 Донат 999₽</button>
<button onclick="spin()">🎡 Колесо наказаний</button>
<button onclick="chaos()">🌈 СЛОМАТЬ САЙТ</button>
<button onclick="lag()">📉 УБИТЬ FPS</button>
<button onclick="clicker()">🎮 Кликер</button>

<h2>💬 ЧАТ</h2>
<div id="chat"></div>

<h2>🔊 САУНДБОРД</h2>
<button onclick="sound('AAAAAAAA')">ААААА</button>
<button onclick="sound('ЧТО ЭТО БЫЛО')">ЧТО ЭТО</button>

<script>

let online = 1;
setInterval(()=>{
online += Math.floor(Math.random()*5);
document.getElementById("online").innerText = online;
},2000);

// чат
const phrases = [
"где вебка",
"ты читер",
"лучшиииий",
"давай ещё",
"стрим топ",
"это было случайно"
];

setInterval(()=>{
let msg = phrases[Math.floor(Math.random()*phrases.length)];
let div = document.createElement("div");
div.innerText = "👤 viewer: " + msg;
document.getElementById("chat").appendChild(div);
},1500);

// донат
function donate(){
let msg = "СПАСИБО ЗА 999 РУБЛЕЙ БРАТ";
alert(msg);

let speech = new SpeechSynthesisUtterance(msg);
speech.lang = "ru-RU";
speechSynthesis.speak(speech);
}

// колесо
function spin(){
let punish = [
"выпить воду",
"кричать 10 секунд",
"играть без рук",
"сделать флекс"
];
alert("ТВОЁ НАКАЗАНИЕ: " + punish[Math.floor(Math.random()*punish.length)]);
}

// хаос
function chaos(){
document.body.classList.add("glitch");
document.body.style.background = "rainbow";
}

// лаг
function lag(){
while(true){}
}

// кликер
let clicks = 0;
function clicker(){
clicks++;
alert("КЛИКОВ: " + clicks);
}

// звук
function sound(text){
let speech = new SpeechSynthesisUtterance(text);
speech.lang = "ru-RU";
speechSynthesis.speak(speech);
}

</script>

</body>
</html>
